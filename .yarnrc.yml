cacheFolder: .yarn/cache

npmRegistryServer: "https://registry.npmjs.org"

npmScopes:
  pixelcoda:
    npmRegistryServer: "https://registry.npmjs.org"

npmRegistries:
  "https://npm.pkg.github.com":
    npmAuthToken: "${GITHUB_TOKEN}"
  "https://registry.npmjs.org":
    npmAuthToken: "${NPM_TOKEN}"
