name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Yarn for GitHub Packages
        run: yarn config set npmRegistries."https://npm.pkg.github.com".npmAuthToken "${{ secrets.GITHUB_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Yarn for registry.npmjs.org
        run: yarn config set npmRegistries."https://registry.npmjs.org".npmAuthToken "${{ secrets.NPM_TOKEN }}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Enable Corepack
        run: corepack enable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit Tests
        run: yarn test

      - name: Build
        run: yarn build

  release:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Yarn for GitHub Packages
        run: yarn config set npmRegistries."https://npm.pkg.github.com".npmAuthToken "${{ secrets.GITHUB_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Yarn for registry.npmjs.org
        run: yarn config set npmRegistries."https://registry.npmjs.org".npmAuthToken "${{ secrets.NPM_TOKEN }}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Enable Corepack
        run: corepack enable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Publish to npm
        run: yarn npm publish
